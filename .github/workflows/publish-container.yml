# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json

name: Build, Test & Publish Containers

on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:
  release:
    types: [created]

env:
  REGISTRY: ghcr.io
  REGISTRY_USER: ${{ github.repository_owner }}
  NGINX_BASE_VERSION: 2.0.0
  NGINX_CORE_VERSION: 2.0.0
  NGINX_CDN_VERSION: 2.0.0
  NGINX_SPA_VERSION: 1.0.0

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      nginx: ${{ steps.filter.outputs.nginx || steps.all.outputs.nginx }}
      nextjs: ${{ steps.filter.outputs.nextjs || steps.all.outputs.nextjs }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - id: filter
        if: github.event_name == 'push' || github.event_name == 'pull_request'
        uses: dorny/paths-filter@6852f92c20ea7fd3b0c25de3b5112db3a98da050 # v3
        with:
          filters: |
            nginx:
              - 'nginx/**'
              - 'skills/nginx-cdn/**'
              - 'skills/nginx-spa/**'
              - 'skills/README.md'
              - 'tests/nginx/**'
              - 'tests/skills/**'
              - 'catalog/images.yaml'
              - 'docs/architecture/image-catalog.md'
              - '.github/workflows/publish-container.yml'
            nextjs:
              - 'nextjs/**'
              - '.github/workflows/publish-container.yml'
      - id: all
        if: github.event_name == 'release' || github.event_name == 'workflow_dispatch'
        run: |
          echo 'nginx=true' >> "$GITHUB_OUTPUT"
          echo 'nextjs=true' >> "$GITHUB_OUTPUT"

  nginx-test:
    needs: changes
    if: needs.changes.outputs.nginx == 'true' || github.event_name == 'release' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Install shell validation tools
        run: sudo apt-get update && sudo apt-get install -y shellcheck

      - name: Static checks
        run: |
          tests/nginx/static.sh
          ruby tests/nginx/catalog.rb
          ruby tests/skills/validate.rb
          find nginx tests/nginx tests/skills skills/nginx-cdn skills/nginx-spa -type f -name '*.sh' -print0 | xargs -0 shellcheck
          docker compose -f skills/nginx-cdn/assets/compose.yaml config >/dev/null
          docker compose -f skills/nginx-spa/assets/compose.yaml config >/dev/null
          ruby -e 'require "yaml"; YAML.safe_load(File.read("catalog/images.yaml"), permitted_classes: [], permitted_symbols: [], aliases: true); YAML.safe_load(File.read(".github/workflows/publish-container.yml"), permitted_classes: [], permitted_symbols: [], aliases: true)'

      - name: Validate Agent Skills specification
        run: |
          python3 -m venv /tmp/skills-ref
          /tmp/skills-ref/bin/pip install --disable-pip-version-check skills-ref==0.1.1
          /tmp/skills-ref/bin/agentskills validate skills/nginx-cdn
          /tmp/skills-ref/bin/agentskills validate skills/nginx-spa

      - name: Verify skills.sh discovery
        run: |
          npx --yes skills@1.5.19 add . --list | tee /tmp/skills-list.txt
          grep -Eq 'nginx-cdn' /tmp/skills-list.txt
          grep -Eq 'nginx-spa' /tmp/skills-list.txt

      - name: Lint GitHub Actions workflow
        run: |
          docker run --rm --volume "$PWD:/repo:ro" --workdir /repo \
            docker.io/rhysd/actionlint:1.7.7@sha256:887a259a5a534f3c4f36cb02dca341673c6089431057242cdc931e9f133147e9 \
            .github/workflows/publish-container.yml

      - name: Lint Dockerfiles
        run: |
          docker run --rm --volume "$PWD:/work:ro" --workdir /work \
            ghcr.io/hadolint/hadolint:v2.14.0-debian@sha256:158cd0184dcaa18bd8ec20b61f4c1cabdf8b32a592d062f57bdcb8e4c1d312e2 \
            hadolint nginx/base/Dockerfile nginx/core/Dockerfile nginx/cdn/Dockerfile nginx/spa/Dockerfile \
              skills/nginx-cdn/assets/Dockerfile skills/nginx-spa/assets/Dockerfile

      - name: Build dependency closure locally
        env:
          BUILD_DATE: ${{ github.event.repository.updated_at }}
          BUILD_REV: ${{ github.sha }}
        run: |
          docker build -t local/nginx/base:test \
            --build-arg BUILD_VERSION="$NGINX_BASE_VERSION" --build-arg BUILD_DATE="$BUILD_DATE" --build-arg BUILD_REV="$BUILD_REV" nginx/base
          docker build -t local/nginx/core:test \
            --build-arg NGINX_BASE_IMAGE=local/nginx/base:test \
            --build-arg BUILD_VERSION="$NGINX_CORE_VERSION" --build-arg BUILD_DATE="$BUILD_DATE" --build-arg BUILD_REV="$BUILD_REV" nginx/core
          docker build -t local/nginx/cdn:test \
            --build-arg NGINX_CORE_IMAGE=local/nginx/core:test \
            --build-arg BUILD_VERSION="$NGINX_CDN_VERSION" --build-arg BUILD_DATE="$BUILD_DATE" --build-arg BUILD_REV="$BUILD_REV" nginx/cdn
          docker build -t local/nginx/spa:test \
            --build-arg NGINX_CDN_IMAGE=local/nginx/cdn:test \
            --build-arg BUILD_VERSION="$NGINX_SPA_VERSION" --build-arg BUILD_DATE="$BUILD_DATE" --build-arg BUILD_REV="$BUILD_REV" nginx/spa

      - name: Runtime integration tests
        run: tests/nginx/integration.sh

      - name: Verify OCI version labels
        run: |
          test "$(docker image inspect local/nginx/base:test --format '{{ index .Config.Labels "org.opencontainers.image.version" }}')" = "$NGINX_BASE_VERSION"
          test "$(docker image inspect local/nginx/core:test --format '{{ index .Config.Labels "org.opencontainers.image.version" }}')" = "$NGINX_CORE_VERSION"
          test "$(docker image inspect local/nginx/cdn:test --format '{{ index .Config.Labels "org.opencontainers.image.version" }}')" = "$NGINX_CDN_VERSION"
          test "$(docker image inspect local/nginx/spa:test --format '{{ index .Config.Labels "org.opencontainers.image.version" }}')" = "$NGINX_SPA_VERSION"

  nginx-publish:
    needs: [changes, nginx-test]
    if: github.event_name != 'pull_request' && (needs.changes.outputs.nginx == 'true' || github.event_name == 'release' || github.event_name == 'workflow_dispatch')
    runs-on: ubuntu-latest
    concurrency:
      group: nginx-publish
      cancel-in-progress: false
    permissions:
      contents: read
      packages: write
      id-token: write
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130 # v3
      - uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Log in to GHCR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ env.REGISTRY_USER }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Cosign
        uses: sigstore/cosign-installer@053f9b74638557590800a301da1ba82351507e2c # v3.8.1

      - name: Build and push temporary multi-platform closure
        env:
          BUILD_DATE: ${{ github.event.repository.updated_at }}
          BUILD_REV: ${{ github.sha }}
        run: |
          set -euo pipefail
          suffix="candidate-${GITHUB_SHA::12}-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
          base="$REGISTRY/$REGISTRY_USER/nginx/base:$suffix"
          core="$REGISTRY/$REGISTRY_USER/nginx/core:$suffix"
          cdn="$REGISTRY/$REGISTRY_USER/nginx/cdn:$suffix"
          spa="$REGISTRY/$REGISTRY_USER/nginx/spa:$suffix"

          docker buildx build --platform linux/amd64,linux/arm64 --push --sbom=true --provenance=mode=max -t "$base" \
            --build-arg BUILD_VERSION="$NGINX_BASE_VERSION" --build-arg BUILD_DATE="$BUILD_DATE" --build-arg BUILD_REV="$BUILD_REV" nginx/base
          docker buildx build --platform linux/amd64,linux/arm64 --push --sbom=true --provenance=mode=max -t "$core" \
            --build-arg NGINX_BASE_IMAGE="$base" \
            --build-arg BUILD_VERSION="$NGINX_CORE_VERSION" --build-arg BUILD_DATE="$BUILD_DATE" --build-arg BUILD_REV="$BUILD_REV" nginx/core
          docker buildx build --platform linux/amd64,linux/arm64 --push --sbom=true --provenance=mode=max -t "$cdn" \
            --build-arg NGINX_CORE_IMAGE="$core" \
            --build-arg BUILD_VERSION="$NGINX_CDN_VERSION" --build-arg BUILD_DATE="$BUILD_DATE" --build-arg BUILD_REV="$BUILD_REV" nginx/cdn
          docker buildx build --platform linux/amd64,linux/arm64 --push --sbom=true --provenance=mode=max -t "$spa" \
            --build-arg NGINX_CDN_IMAGE="$cdn" \
            --build-arg BUILD_VERSION="$NGINX_SPA_VERSION" --build-arg BUILD_DATE="$BUILD_DATE" --build-arg BUILD_REV="$BUILD_REV" nginx/spa

          printf 'BASE_TEMP=%s\nCORE_TEMP=%s\nCDN_TEMP=%s\nSPA_TEMP=%s\n' "$base" "$core" "$cdn" "$spa" >> "$GITHUB_ENV"
          for pair in "BASE:$base" "CORE:$core" "CDN:$cdn" "SPA:$spa"; do
            name=${pair%%:*}
            image=${pair#*:}
            if ! digest=$(docker buildx imagetools inspect "$image" | awk '$1 == "Digest:" && digest == "" { digest=$2 } END { if (digest == "") exit 1; print digest }'); then
              echo >&2 "Could not resolve the pushed digest for $image"
              exit 1
            fi
            echo "Resolved $image to $digest"
            printf '%s_DIGEST_REF=%s@%s\n' "$name" "${image%:*}" "$digest" >> "$GITHUB_ENV"
          done

      - name: Test published native manifests
        run: |
          NGINX_BASE_IMAGE="$BASE_DIGEST_REF" \
          NGINX_CORE_IMAGE="$CORE_DIGEST_REF" \
          NGINX_CDN_IMAGE="$CDN_DIGEST_REF" \
          NGINX_SPA_IMAGE="$SPA_DIGEST_REF" \
            tests/nginx/integration.sh

      - name: Scan temporary images
        run: |
          set -euo pipefail
          mkdir -p "$RUNNER_TEMP/trivy-cache"
          for image in "$BASE_DIGEST_REF" "$CORE_DIGEST_REF" "$CDN_DIGEST_REF" "$SPA_DIGEST_REF"; do
            docker run --rm \
              --volume "$HOME/.docker:/root/.docker:ro" \
              --volume "$RUNNER_TEMP/trivy-cache:/root/.cache/trivy" \
              docker.io/aquasec/trivy:0.67.2@sha256:e2b22eac59c02003d8749f5b8d9bd073b62e30fefaef5b7c8371204e0a4b0c08 \
              image --scanners vuln --exit-code 1 --exit-on-eol 1 --severity HIGH,CRITICAL "$image"
          done

      - name: Sign immutable digests
        run: |
          set -euo pipefail
          for image in "$BASE_DIGEST_REF" "$CORE_DIGEST_REF" "$CDN_DIGEST_REF" "$SPA_DIGEST_REF"; do
            cosign sign --yes "$image"
          done

      - name: Preflight immutable SHA tags
        run: |
          set -euo pipefail
          validate_version() {
            version=$1
            if [[ ! "$version" =~ ^(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)$ ]]; then
              echo >&2 "$version is not a valid major.minor.patch version"
              exit 1
            fi
          }
          validate_version "$NGINX_BASE_VERSION"
          validate_version "$NGINX_CORE_VERSION"
          validate_version "$NGINX_CDN_VERSION"
          validate_version "$NGINX_SPA_VERSION"

          resolve_digest() {
            docker buildx imagetools inspect "$1" | awk '$1 == "Digest:" && digest == "" { digest=$2 } END { if (digest == "") exit 1; print digest }'
          }

          sha_tag="sha-${GITHUB_SHA::12}"
          for pair in \
            "$BASE_DIGEST_REF|$REGISTRY/$REGISTRY_USER/nginx/base:$sha_tag" \
            "$CORE_DIGEST_REF|$REGISTRY/$REGISTRY_USER/nginx/core:$sha_tag" \
            "$CDN_DIGEST_REF|$REGISTRY/$REGISTRY_USER/nginx/cdn:$sha_tag" \
            "$SPA_DIGEST_REF|$REGISTRY/$REGISTRY_USER/nginx/spa:$sha_tag"; do
            source=${pair%%|*}
            reference=${pair#*|}
            if actual=$(resolve_digest "$reference" 2>/dev/null); then
              expected=${source##*@}
              if [ "$actual" != "$expected" ]; then
                echo >&2 "$reference already exists with $actual, expected immutable digest $expected"
                exit 1
              fi
              echo "$reference already points to the candidate digest"
            fi
          done
          echo 'Existing version tags will be replaced; SHA tags remain immutable'

      - name: Promote version tags
        run: |
          set -euo pipefail
          promote_version() {
            source=$1
            repository=$2
            version=$3
            if [[ ! "$version" =~ ^(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)$ ]]; then
              echo >&2 "$version is not a valid major.minor.patch version"
              exit 1
            fi
            major_tag=${version%%.*}
            minor_tag=${version%.*}
            patch_tag=$version
            docker buildx imagetools create \
              -t "$repository:$patch_tag" \
              -t "$repository:$minor_tag" \
              -t "$repository:$major_tag" \
              "$source"
          }
          promote_version "$BASE_TEMP" "$REGISTRY/$REGISTRY_USER/nginx/base" "$NGINX_BASE_VERSION"
          promote_version "$CORE_TEMP" "$REGISTRY/$REGISTRY_USER/nginx/core" "$NGINX_CORE_VERSION"
          promote_version "$CDN_TEMP" "$REGISTRY/$REGISTRY_USER/nginx/cdn" "$NGINX_CDN_VERSION"
          promote_version "$SPA_TEMP" "$REGISTRY/$REGISTRY_USER/nginx/spa" "$NGINX_SPA_VERSION"

      - name: Promote SHA and latest tags
        run: |
          set -euo pipefail
          sha_tag="sha-${GITHUB_SHA::12}"
          docker buildx imagetools create -t "$REGISTRY/$REGISTRY_USER/nginx/base:$sha_tag" -t "$REGISTRY/$REGISTRY_USER/nginx/base:latest" "$BASE_TEMP"
          docker buildx imagetools create -t "$REGISTRY/$REGISTRY_USER/nginx/core:$sha_tag" -t "$REGISTRY/$REGISTRY_USER/nginx/core:latest" "$CORE_TEMP"
          docker buildx imagetools create -t "$REGISTRY/$REGISTRY_USER/nginx/cdn:$sha_tag" -t "$REGISTRY/$REGISTRY_USER/nginx/cdn:latest" "$CDN_TEMP"
          docker buildx imagetools create -t "$REGISTRY/$REGISTRY_USER/nginx/spa:$sha_tag" -t "$REGISTRY/$REGISTRY_USER/nginx/spa:latest" "$SPA_TEMP"

      - name: Verify promoted digests
        run: |
          set -euo pipefail
          assert_digest() {
            expected_ref=$1
            promoted_ref=$2
            expected=${expected_ref##*@}
            if ! actual=$(docker buildx imagetools inspect "$promoted_ref" | awk '$1 == "Digest:" && digest == "" { digest=$2 } END { if (digest == "") exit 1; print digest }'); then
              echo >&2 "Could not resolve the promoted digest for $promoted_ref"
              exit 1
            fi
            if [ "$actual" != "$expected" ]; then
              echo >&2 "$promoted_ref resolved to $actual, expected signed digest $expected"
              exit 1
            fi
          }
          sha_tag="sha-${GITHUB_SHA::12}"
          verify_image() {
            digest_ref=$1
            repository=$2
            version=$3
            if [[ ! "$version" =~ ^(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)$ ]]; then
              echo >&2 "$version is not a valid major.minor.patch version"
              exit 1
            fi
            major_tag=${version%%.*}
            minor_tag=${version%.*}
            assert_digest "$digest_ref" "$repository:$sha_tag"
            assert_digest "$digest_ref" "$repository:latest"
            assert_digest "$digest_ref" "$repository:$major_tag"
            assert_digest "$digest_ref" "$repository:$minor_tag"
            assert_digest "$digest_ref" "$repository:$version"
          }
          verify_image "$BASE_DIGEST_REF" "$REGISTRY/$REGISTRY_USER/nginx/base" "$NGINX_BASE_VERSION"
          verify_image "$CORE_DIGEST_REF" "$REGISTRY/$REGISTRY_USER/nginx/core" "$NGINX_CORE_VERSION"
          verify_image "$CDN_DIGEST_REF" "$REGISTRY/$REGISTRY_USER/nginx/cdn" "$NGINX_CDN_VERSION"
          verify_image "$SPA_DIGEST_REF" "$REGISTRY/$REGISTRY_USER/nginx/spa" "$NGINX_SPA_VERSION"

  nextjs-publish:
    needs: changes
    if: needs.changes.outputs.nextjs == 'true' || github.event_name == 'release' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      max-parallel: 1
      matrix:
        include:
          - name: nextjs
            path: nextjs/base
          - name: nextjs
            path: nextjs/with-prisma
          - name: nexload
            path: nextjs/with-payload
    permissions:
      contents: read
      packages: write
      id-token: write
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3
      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ env.REGISTRY_USER }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: version
        run: |
          version=$(grep 'ARG BUILD_VERSION' "${{ matrix.path }}/Dockerfile" | cut -d= -f2)
          echo "version=$version" >> "$GITHUB_OUTPUT"
      - id: meta
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5
        with:
          images: ghcr.io/${{ env.REGISTRY_USER }}/${{ matrix.name }}
          tags: |
            type=ref,event=branch
            type=raw,value=${{ steps.version.outputs.version }}
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=,format=short
      - id: build-nextjs
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: ${{ matrix.path }}
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          provenance: mode=max
          sbom: true
          build-args: |
            BUILD_DATE=${{ github.event.repository.updated_at }}
            BUILD_REV=${{ github.sha }}
      - name: Install Cosign
        if: github.event_name != 'pull_request'
        uses: sigstore/cosign-installer@053f9b74638557590800a301da1ba82351507e2c # v3.8.1
      - name: Sign Next.js image digest
        if: github.event_name != 'pull_request'
        run: cosign sign --yes "ghcr.io/${{ env.REGISTRY_USER }}/${{ matrix.name }}@${{ steps.build-nextjs.outputs.digest }}"
