name: Build Containers

on:
  pull_request:
  schedule:
    - cron: "17 2 * * *"
  workflow_dispatch:
    inputs:
      mode:
        type: choice
        options:
          - changed
          - full
        default: full

permissions:
  contents: read

jobs:
  plan:
    runs-on: ubuntu-latest
    outputs:
      targets: ${{ steps.plan.outputs.targets }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4.3.1
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4.4.0
        with:
          node-version: 24
          cache: pnpm

      - name: Enable Corepack
        run: corepack enable

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Create build plan
        id: plan
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            pnpm --silent --filter @gecut/container-bake cli plan --mode changed --base-ref "${{ github.event.pull_request.base.sha }}" --head-ref "${{ github.event.pull_request.head.sha }}" > build-plan.json
          elif [[ "${{ github.event_name }}" == "workflow_dispatch" && "${{ inputs.mode }}" == "changed" ]]; then
            pnpm --silent --filter @gecut/container-bake cli plan --mode changed --base-ref "origin/${{ github.event.repository.default_branch }}" --head-ref HEAD > build-plan.json
          else
            pnpm --silent --filter @gecut/container-bake cli plan --mode full > build-plan.json
          fi
          echo "targets=$(node -e 'const p=require("./build-plan.json"); process.stdout.write(JSON.stringify(p.targets))')" >> "$GITHUB_OUTPUT"

  build:
    needs: plan
    if: needs.plan.outputs.targets != '[]'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target: ${{ fromJson(needs.plan.outputs.targets) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4.3.1

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3.9.0

      - name: Build without publish
        run: docker buildx bake --file docker-bake.hcl "${{ matrix.target }}"
