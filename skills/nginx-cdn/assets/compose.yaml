services:
  static-origin:
    image: ghcr.io/gecut/nginx/cdn:2.0.0
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - type: bind
        source: ./public
        target: /data
        read_only: true
    environment:
      NGINX_FORCE_DOMAIN: ""
      NGINX_AUTO_WEBP: "off"
      NGINX_CORS_ENABLE: "off"
    security_opt:
      - no-new-privileges:true
