apiVersion: v1
kind: ConfigMap
metadata:
  name: nginx-cdn-content
data:
  index.html: |
    <!doctype html>
    <html lang="en">
      <head><meta charset="utf-8"><title>Static origin</title></head>
      <body><h1>Static origin is ready</h1></body>
    </html>
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx-cdn
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: nginx-cdn
  template:
    metadata:
      labels:
        app.kubernetes.io/name: nginx-cdn
    spec:
      automountServiceAccountToken: false
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: origin
          image: ghcr.io/gecut/nginx/cdn:2.0.0
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 80
          readinessProbe:
            httpGet:
              path: /server-info
              port: http
            initialDelaySeconds: 2
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /server-info
              port: http
            initialDelaySeconds: 10
            periodSeconds: 30
          resources:
            requests:
              cpu: 25m
              memory: 32Mi
            limits:
              cpu: 500m
              memory: 128Mi
          securityContext:
            allowPrivilegeEscalation: false
          volumeMounts:
            - name: content
              mountPath: /data
              readOnly: true
      volumes:
        - name: content
          configMap:
            name: nginx-cdn-content
---
apiVersion: v1
kind: Service
metadata:
  name: nginx-cdn
spec:
  selector:
    app.kubernetes.io/name: nginx-cdn
  ports:
    - name: http
      port: 80
      targetPort: http
